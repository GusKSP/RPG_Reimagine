<body onload="listar()">
  <div class="header">
    <div class="container">
      <div class="esquerda">
        <div class="logo"></div>
      </div>
      <ul class="navbar">
        <li class="agora">
          <a href="../pgs_rpg_reimagine/jogar.html">Jogar</a>
        </li>
        <li>
          <div class="btn_navbar">
            <a href="../pgs_rpg_reimagine/login.html">Login</a>
          </div>
        </li>
        <li class="agora">
          <div class="btn_navbar">
            <a href="#">Cadastro</a>
          </div>
        </li>
      </ul>
    </div>
  </div>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Cadastre-se</h2>
        <div class="formulario">

          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Nome de usuario" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="usuario@gmail.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmar Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="../assets/imgs/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <div class="footer">
    <div class="container">
      <h4>Feito por Gus Kenzo Shigeoka Paulino <span class="version">v1.0.0</span></h4>
      <h4>SPTech &copy; 2023</h4>
    </div>
  </div>
  <!--footer fim-->

</html>
<script src="../js/sessao.js"></script>
<script src="../js/alerta.js"></script>

<script>

  // Array para armazenar usuarios cadastrados para validação de código de ativação 
  let listaUsuariosCadastrados = [];

  function cadastrar() {
    aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var idUsuarioVincular;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Campos em branco. Por favor, preencha todos os campos para realizar o cadastro!";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o email é de algum usuário já cadastrado
    for (let i = 0; i < listaUsuariosCadastrados.length; i++) {
      if (listaUsuariosCadastrados[i].email == emailVar) {
        idUsuarioVincular = listaUsuariosCadastrados[i].id
        console.log("Email já cadastrado. Fazer login?");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Email já cadastrado. Deseja fazer login?";
        finalizarAguardar();
      }
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idUsuarioVincularServer: idUsuarioVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaUsuariosCadastrados.push(empresa);

            console.log("listaUsuariosCadastrados")
            console.log(listaUsuariosCadastrados[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
